<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Sprint Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: #1e293b;
            --primary-color: #3b82f6;
            --accent-color: #10b981;
            --danger-color: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            margin-top: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Distance Selector */
        .distance-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 30px;
        }

        .dist-btn {
            background-color: var(--surface-color);
            border: 2px solid transparent;
            color: var(--text-main);
            padding: 12px 0;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .dist-btn.active {
            border-color: var(--primary-color);
            background-color: rgba(59, 130, 246, 0.1);
            color: var(--primary-color);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        /* Main Display */
        .tracker-display {
            background-color: var(--surface-color);
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 40px 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            position: relative;
            overflow: hidden;
        }

        .timer {
            font-size: 56px;
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .timer-ms {
            font-size: 24px;
            color: var(--text-muted);
        }

        .distance-live {
            font-size: 20px;
            color: var(--accent-color);
            font-weight: 600;
            margin-top: 15px;
        }

        .gps-status {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: var(--danger-color);
        }
        .status-dot.searching { background-color: #eab308; }
        .status-dot.locked { background-color: var(--accent-color); }

        /* Controls */
        .controls {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 16px;
            border: none;
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.3s;
            color: white;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-start { background-color: var(--accent-color); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4); }
        .btn-stop { background-color: var(--danger-color); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); display: none; }
        .btn-reset { background-color: var(--surface-color); color: var(--text-main); }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Completion Overlay */
        .completion-msg {
            display: none;
            color: var(--accent-color);
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Pro Sprint Tracker</h1>
    </header>

    <div class="distance-selector" id="distSelector">
        <button class="dist-btn active" data-dist="100">100m</button>
        <button class="dist-btn" data-dist="200">200m</button>
        <button class="dist-btn" data-dist="300">300m</button>
        <button class="dist-btn" data-dist="400">400m</button>
    </div>

    <div class="tracker-display">
        <div class="timer" id="timerDisplay">00:00<span class="timer-ms">.00</span></div>
        <div class="distance-live" id="distanceDisplay">0.0 / 100m</div>
        <div class="gps-status">
            <div class="status-dot" id="gpsIndicator"></div>
            <span id="gpsText">GPS Offline</span>
        </div>
        <div class="completion-msg" id="completionMsg">Target Reached!</div>
    </div>

    <div class="controls">
        <button class="btn btn-reset" id="resetBtn">Reset</button>
        <button class="btn btn-start" id="startBtn">Start</button>
        <button class="btn btn-stop" id="stopBtn">Stop</button>
    </div>

    <script>
        // --- State Variables ---
        let targetDistance = 100;
        let currentDistance = 0;
        let isRunning = false;
        let startTime = 0;
        let timerInterval = null;
        let watchId = null;
        let lastPosition = null;

        // --- DOM Elements ---
        const distButtons = document.querySelectorAll('.dist-btn');
        const timerDisplay = document.getElementById('timerDisplay');
        const distanceDisplay = document.getElementById('distanceDisplay');
        const gpsIndicator = document.getElementById('gpsIndicator');
        const gpsText = document.getElementById('gpsText');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const completionMsg = document.getElementById('completionMsg');
        const distSelector = document.getElementById('distSelector');

        // --- Distance Selection Logic ---
        distButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isRunning) return; // Don't allow changing distance while running
                distButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                targetDistance = parseInt(btn.getAttribute('data-dist'));
                updateDistanceDisplay();
            });
        });

        // --- Haversine Formula (Calculates distance between two GPS coordinates) ---
        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const toRad = (value) => value * Math.PI / 180;
            const phi1 = toRad(lat1);
            const phi2 = toRad(lat2);
            const deltaPhi = toRad(lat2 - lat1);
            const deltaLambda = toRad(lon2 - lon1);

            const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

            return R * c; 
        }

        // --- Timer Logic ---
        function updateTimer() {
            const elapsedTime = Date.now() - startTime;
            const minutes = Math.floor(elapsedTime / 60000);
            const seconds = Math.floor((elapsedTime % 60000) / 1000);
            const milliseconds = Math.floor((elapsedTime % 1000) / 10); // 2 digits

            const formattedMins = minutes.toString().padStart(2, '0');
            const formattedSecs = seconds.toString().padStart(2, '0');
            const formattedMs = milliseconds.toString().padStart(2, '0');

            timerDisplay.innerHTML = `${formattedMins}:${formattedSecs}<span class="timer-ms">.${formattedMs}</span>`;
        }

        function updateDistanceDisplay() {
            distanceDisplay.innerText = `${currentDistance.toFixed(1)} / ${targetDistance}m`;
        }

        // --- GPS Tracking Logic ---
        function handlePosition(position) {
            const { latitude, longitude, accuracy } = position.coords;

            // Update GPS UI status
            if (accuracy < 10) {
                gpsIndicator.className = 'status-dot locked';
                gpsText.innerText = `GPS Locked (Acc: ${Math.round(accuracy)}m)`;
            } else {
                gpsIndicator.className = 'status-dot searching';
                gpsText.innerText = `GPS Weak (Acc: ${Math.round(accuracy)}m)`;
            }

            // Filter out highly inaccurate jumps (accuracy worse than 20 meters)
            if (accuracy > 20) return; 

            if (lastPosition) {
                const distMoved = calculateDistance(
                    lastPosition.latitude, lastPosition.longitude,
                    latitude, longitude
                );

                // Ignore micro-movements (GPS jitter) less than 0.5 meters
                if (distMoved > 0.5) {
                    currentDistance += distMoved;
                    updateDistanceDisplay();

                    // Check if target is reached
                    if (currentDistance >= targetDistance) {
                        finishSprint();
                    }
                }
            }

            lastPosition = { latitude, longitude };
        }

        function handleGpsError(error) {
            console.warn(`GPS Error: ${error.message}`);
            gpsIndicator.className = 'status-dot';
            gpsText.innerText = 'GPS Error. Please allow location.';
        }

        // --- App Flow ---
        function startApp() {
            if (!navigator.geolocation) {
                alert("Your browser doesn't support geolocation.");
                return;
            }

            // Reset variables for fresh start
            currentDistance = 0;
            lastPosition = null;
            isRunning = true;
            completionMsg.style.display = 'none';
            distSelector.style.opacity = '0.5';
            distSelector.style.pointerEvents = 'none';
            updateDistanceDisplay();

            // Toggle UI Buttons
            startBtn.style.display = 'none';
            stopBtn.style.display = 'block';
            resetBtn.disabled = true;

            gpsIndicator.className = 'status-dot searching';
            gpsText.innerText = 'Acquiring GPS...';

            // Start Timer
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 10); // Update every 10ms for smooth UI

            // Start GPS Tracking (High Accuracy Mode)
            watchId = navigator.geolocation.watchPosition(
                handlePosition, 
                handleGpsError, 
                { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
            );
        }

        function stopApp() {
            isRunning = false;
            clearInterval(timerInterval);
            if (watchId !== null) {
                navigator.geolocation.clearWatch(watchId);
                watchId = null;
            }

            // Restore UI
            startBtn.style.display = 'block';
            stopBtn.style.display = 'none';
            resetBtn.disabled = false;
            distSelector.style.opacity = '1';
            distSelector.style.pointerEvents = 'auto';
            gpsIndicator.className = 'status-dot';
            gpsText.innerText = 'Tracking Paused';
        }

        function finishSprint() {
            stopApp();
            currentDistance = targetDistance; // Snap to target visually
            updateDistanceDisplay();
            completionMsg.style.display = 'block';
            gpsText.innerText = 'Sprint Completed!';
            
            // Optional: Vibrate phone if supported
            if (navigator.vibrate) {
                navigator.vibrate([200, 100, 200]);
            }
        }

        function resetApp() {
            if (isRunning) return;
            currentDistance = 0;
            timerDisplay.innerHTML = `00:00<span class="timer-ms">.00</span>`;
            updateDistanceDisplay();
            completionMsg.style.display = 'none';
            gpsIndicator.className = 'status-dot';
            gpsText.innerText = 'GPS Offline';
        }

        // --- Event Listeners ---
        startBtn.addEventListener('click', startApp);
        stopBtn.addEventListener('click', stopApp);
        resetBtn.addEventListener('click', resetApp);
    </script>
</body>
</html>
